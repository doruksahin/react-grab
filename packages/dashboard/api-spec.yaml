openapi: 3.0.3
info:
  title: react-grab Sync API
  version: 0.1.0
  description: API for the react-grab dashboard — selections, groups, workspaces.

servers:
  - url: http://localhost:3847
    description: Local sync-server

paths:
  /workspaces/{workspaceId}/selections:
    get:
      operationId: listSelections
      tags: [selections]
      summary: List all selections in a workspace
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/SelectionStatus"
      responses:
        "200":
          description: Array of selections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Selection"
    put:
      operationId: persistSelections
      tags: [selections]
      summary: Replace all selections in a workspace
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/Selection"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /workspaces/{workspaceId}/selections/{selectionId}:
    get:
      operationId: getSelection
      tags: [selections]
      summary: Get a single selection by ID
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/SelectionId"
      responses:
        "200":
          description: A single selection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Selection"
        "404":
          description: Selection not found

  /workspaces/{workspaceId}/groups:
    get:
      operationId: listGroups
      tags: [groups]
      summary: List all groups in a workspace
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Array of groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SelectionGroup"
    put:
      operationId: persistGroups
      tags: [groups]
      summary: Replace all groups in a workspace
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/SelectionGroup"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /health:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]

components:
  parameters:
    WorkspaceId:
      name: workspaceId
      in: path
      required: true
      schema:
        type: string
    SelectionId:
      name: selectionId
      in: path
      required: true
      schema:
        type: string

  schemas:
    SelectionStatus:
      type: string
      enum: [open, ticketed, resolved]

    Selection:
      type: object
      required:
        - id
        - groupId
        - content
        - elementName
        - tagName
        - timestamp
        - revealed
        - status
      properties:
        id:
          type: string
        groupId:
          type: string
        content:
          type: string
          description: Element HTML snapshot
        elementName:
          type: string
        tagName:
          type: string
        componentName:
          type: string
          nullable: true
        elementsCount:
          type: integer
        elementSelectors:
          type: array
          items:
            type: string
        commentText:
          type: string
          nullable: true
        timestamp:
          type: number
        revealed:
          type: boolean
        status:
          $ref: "#/components/schemas/SelectionStatus"
        pageUrl:
          type: string
          nullable: true
        pageTitle:
          type: string
          nullable: true
        screenshotFullPage:
          type: string
          nullable: true
          description: R2 key for full-page screenshot
        screenshotElement:
          type: string
          nullable: true
          description: R2 key for element screenshot
        jiraTicketId:
          type: string
          nullable: true
        capturedBy:
          type: string
          nullable: true

    SelectionGroup:
      type: object
      required: [id, name, createdAt, revealed]
      properties:
        id:
          type: string
        name:
          type: string
        createdAt:
          type: number
        revealed:
          type: boolean

    StatusResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
